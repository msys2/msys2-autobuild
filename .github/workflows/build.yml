name: 'build'

on:
  workflow_dispatch:
    inputs:
      optional_deps:
        description: 'optional_deps=pkg-A:optional-dep-B,pkg-C:optional-dep-D'
        default: ''
        required: false
        type: string
      context:
        description: 'Extra information from invoker'
        default: ''
        required: false
        type: string
  schedule:
    - cron: '0 0/3 * * *'

env:
  PYTHONUNBUFFERED: 1

permissions: {}

jobs:

  schedule:
    runs-on: ubuntu-24.04

    environment:
      name: build
      deployment: false

    permissions:
      contents: write
      actions: write

    concurrency: autobuild-maint

    outputs:
      build-plan: ${{ steps.check.outputs.build-plan }}

    steps:

    - name: Dump inputs
      if: ${{ github.event_name == 'workflow_dispatch' }}
      env:
        CONTEXT: '${{ toJSON(github.event.inputs) }}'
      run: |
        echo "$CONTEXT"

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Cache pip dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install deps
      env:
        PIP_DISABLE_PIP_VERSION_CHECK: 1
      run: |
        python3 -m venv .venv
        source .venv/bin/activate
        python3 -m pip install -r requirements.txt
        echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH

    - name: Check what we should run
      id: check
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_TOKEN_READONLY: ${{ secrets.GITHUBTOKENREADONLY }}
        OPTIONAL_DEPS: ${{ github.event.inputs.optional_deps }}
      run: |
        python -m msys2_autobuild write-build-plan --optional-deps "$OPTIONAL_DEPS" build_plan.json
        buildPlan="$(cat build_plan.json)"
        echo "build-plan=$buildPlan" >> $GITHUB_OUTPUT

    - name: Clean up assets
      if: steps.check.outputs.build-plan != '[]'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_TOKEN_READONLY: ${{ secrets.GITHUBTOKENREADONLY }}
      run: |
        python -m msys2_autobuild clean-assets

    - name: Show build queue
      if: steps.check.outputs.build-plan != '[]'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_TOKEN_READONLY: ${{ secrets.GITHUBTOKENREADONLY }}
        OPTIONAL_DEPS: ${{ github.event.inputs.optional_deps }}
      run: |
        python -m msys2_autobuild show --optional-deps "$OPTIONAL_DEPS"

    - name: Dispatch build jobs
      if: steps.check.outputs.build-plan != '[]'
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_TOKEN_READONLY: ${{ secrets.GITHUBTOKENREADONLY }}
      run: |
        python -m msys2_autobuild exec-build-plan --target-branch "build-branch" build_plan.json exec_result.json
        execResult="$(cat exec_result.json)"
        echo "exec-result=$execResult" >> $GITHUB_OUTPUT

  supervise:
    timeout-minutes: 4320
    needs: schedule

    environment:
      name: build
      deployment: false

    permissions:
      contents: write
      actions: write

    if: ${{ needs.schedule.outputs.build-plan != '[]' }}
    runs-on: ubuntu-24.04

    steps:

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - name: Cache pip dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install deps
      env:
        PIP_DISABLE_PIP_VERSION_CHECK: 1
      run: |
        python3 -m venv .venv
        source .venv/bin/activate
        python3 -m pip install -r requirements.txt
        echo "$VIRTUAL_ENV/bin" >> $GITHUB_PATH

    - name: Supervise build
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GITHUB_TOKEN_READONLY: ${{ secrets.GITHUBTOKENREADONLY }}
        JOB_CHECK_RUN_ID: ${{ job.check_run_id }}
        TARGET_WORKFLOW_RUN_ID: ${{ fromJson(needs.schedule.outputs.exec-result).run_id }}
      run: |
        python -m msys2_autobuild supervise --workflow-run-id "$TARGET_WORKFLOW_RUN_ID"
